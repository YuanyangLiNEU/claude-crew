# Claude Crew — Agent Configuration
# Each agent gets its own Telegram bot and Claude Code instance.
# Bot tokens and allowed users are configured in .env (not here).

founder: ""  # Your name — agents will refer to you by this name

agents:
  - name: Devin
    id: engineer_devin         # Unique ID, used for @mentions and routing
    role: engineer             # Shared profile: agents/shared/engineer-base.md
    dir: ./agents/engineer_devin
    bot_token_env: ENGINEER_DEVIN_BOT_TOKEN
    model: ""                  # LLM model (opus, sonnet, haiku). Empty = sonnet
    extra_disallowed: ""       # Full access — git push requires founder approval (prompt-enforced)

  - name: Lark
    id: engineer_lark
    role: engineer
    dir: ./agents/engineer_lark
    bot_token_env: ENGINEER_LARK_BOT_TOKEN
    model: ""
    extra_disallowed: ""       # Full access — git push requires founder approval (prompt-enforced)

  - name: Sage
    id: pm_sage
    role: pm
    dir: ./agents/pm_sage
    bot_token_env: PM_SAGE_BOT_TOKEN
    model: ""
    extra_disallowed: "Edit,Write,Bash(npm install *),Bash(git push *),Bash(git commit *)"

  - name: Aria
    id: ux_aria
    role: ux
    dir: ./agents/ux_aria
    bot_token_env: UX_ARIA_BOT_TOKEN
    model: ""
    extra_disallowed: "Edit,Write,Read,Glob,Grep,Bash(npm install *),Bash(git *)"
